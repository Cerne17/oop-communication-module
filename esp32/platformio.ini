; ESP32-CAM (AI Thinker) PlatformIO configuration
[env:esp32cam]
platform  = espressif32
board     = esp32cam
framework = arduino

; Increase upload speed, use larger partition for OTA + SPIFFS
board_build.partitions = huge_app.csv
upload_speed           = 115200
monitor_speed          = 115200

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    ; No external libs needed — BluetoothSerial and esp_camera
    ; are bundled with the Espressif Arduino core.
